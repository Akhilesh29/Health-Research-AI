<svg width="680" height="560" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg" style="background:#ffffff;font-family:Arial,sans-serif">

<!-- USER -->
<rect x="270" y="20" width="140" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="46" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">User</text>

<!-- Arrow: user to frontend -->
<line x1="340" y1="64" x2="340" y2="96" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Response arrow dashed -->
<line x1="332" y1="160" x2="332" y2="68" stroke="#888780" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- FRONTEND -->
<rect x="150" y="96" width="380" height="64" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="340" y="120" text-anchor="middle" font-size="14" font-weight="500" fill="#0C447C">Next.js Frontend</text>
<text x="340" y="140" text-anchor="middle" font-size="12" fill="#185FA5">pages · api routes · TypeScript · Tailwind · Vercel</text>

<!-- JSON label -->
<text x="196" y="196" text-anchor="middle" font-size="12" fill="#5F5E5A">JSON</text>

<!-- Arrow: frontend to backend (request) -->
<line x1="260" y1="160" x2="204" y2="222" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Response dashed -->
<line x1="212" y1="228" x2="268" y2="168" stroke="#888780" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>

<!-- DOCKER COMPOSE boundary -->
<rect x="30" y="210" width="580" height="310" rx="12" fill="none" stroke="#B4B2A9" stroke-width="1" stroke-dasharray="6 4"/>
<text x="50" y="226" font-size="12" fill="#5F5E5A">docker compose</text>

<!-- AUTH SERVICE -->
<rect x="50" y="240" width="160" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="130" y="263" text-anchor="middle" font-size="14" font-weight="500" fill="#3C3489">Auth service</text>
<text x="130" y="281" text-anchor="middle" font-size="12" fill="#534AB7">JWT · sessions</text>

<!-- BACKEND API -->
<rect x="240" y="240" width="180" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="330" y="263" text-anchor="middle" font-size="14" font-weight="500" fill="#085041">Backend API</text>
<text x="330" y="281" text-anchor="middle" font-size="12" fill="#0F6E56">Node.js · Express · REST</text>

<!-- Arrow: auth to backend -->
<line x1="210" y1="268" x2="238" y2="268" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Arrow: backend to postgres -->
<line x1="330" y1="296" x2="330" y2="368" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- POSTGRES -->
<rect x="210" y="368" width="240" height="64" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="330" y="392" text-anchor="middle" font-size="14" font-weight="500" fill="#2C2C2A">PostgreSQL</text>
<text x="330" y="410" text-anchor="middle" font-size="12" fill="#5F5E5A">users · sessions · logs · pgdata</text>

<!-- Arrow: backend to groq (request) -->
<line x1="420" y1="264" x2="466" y2="264" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<!-- Response dashed -->
<line x1="466" y1="276" x2="420" y2="276" stroke="#888780" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="445" y="302" text-anchor="middle" font-size="12" fill="#5F5E5A">response</text>

<!-- GROQ API -->
<rect x="468" y="240" width="120" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="528" y="263" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">Groq API</text>
<text x="528" y="281" text-anchor="middle" font-size="12" fill="#854F0B">api key · .env</text>

<!-- Arrow: groq to model -->
<line x1="528" y1="296" x2="528" y2="338" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- LLM MODEL -->
<rect x="468" y="340" width="120" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="528" y="362" text-anchor="middle" font-size="14" font-weight="500" fill="#633806">LLM model</text>
<text x="528" y="380" text-anchor="middle" font-size="12" fill="#854F0B">health research Q&amp;A</text>

<!-- Docker network label -->
<text x="50" y="504" font-size="12" fill="#5F5E5A">docker network: app ↔ db</text>

<!-- LEGEND -->
<line x1="370" y1="532" x2="420" y2="532" stroke="#444441" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="426" y="536" font-size="12" fill="#5F5E5A">request</text>
<line x1="500" y1="532" x2="550" y2="532" stroke="#888780" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="556" y="536" font-size="12" fill="#5F5E5A">response</text>

<!-- ARROW MARKER -->
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
</svg>
